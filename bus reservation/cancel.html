<main>
  <h2>Cancel Your Ticket</h2>
  <p>Manage your cancellations with ease. Enter your booking details below to cancel your ticket and view refund eligibility.</p>

  <div class="cancel-card">
    <h3>Cancellation Form</h3>
    <form id="cancelForm">
      <label for="ticket-id">Ticket / Booking ID</label>
      <input type="text" id="ticket-id" name="ticket-id" placeholder="Enter your booking ID" required>

      <label for="email">Registered Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <button type="submit">Cancel Ticket</button>
    </form>
  </div>
</main>

<footer>
  &copy; 2025 NexBus Reservation — All Rights Reserved
</footer>

<script>
const cancelForm = document.getElementById('cancelForm');

cancelForm.addEventListener('submit', function(e) {
  e.preventDefault(); // prevent form submission

  // Show confirmation
  const confirmCancel = confirm("Are you sure you want to cancel your ticket?");
  if(confirmCancel) {
    // Show success message
    alert("Your ticket has been successfully cancelled!");
    cancelForm.reset();
  }
});
</script>
